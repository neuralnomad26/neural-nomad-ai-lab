name: Bug Report
description: Report a broken notebook, incorrect output, or code error
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill in as much detail as you can.

  - type: input
    id: notebook
    attributes:
      label: Notebook / File
      description: Path to the affected file (e.g. modules/01-numpy-pandas/notebooks/01_arrays.ipynb)
      placeholder: modules/...
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What went wrong?
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue
      placeholder: |
        1. Open notebook ...
        2. Run cell ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error message or traceback
      render: shell

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14.5 / Ubuntu 22.04 / Windows 11"
    validations:
      required: true
